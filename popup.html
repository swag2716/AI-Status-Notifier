<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Status Notifier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 290px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #1e293b;
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .header h1 { font-size: 13px; font-weight: 600; color: #f1f5f9; }
  .header p  { font-size: 10px; color: #64748b; margin-top: 1px; }

  /* ── Per-tab rows ── */
  #ai-tabs-list { padding: 10px 12px 0; display: flex; flex-direction: column; gap: 8px; }

  .tab-row {
    display: flex; align-items: center; gap: 10px;
    background: #1e293b; border-radius: 10px;
    padding: 10px 10px 10px 12px;
    border: 1.5px solid #334155;
    transition: border-color 0.3s;
  }
  .tab-row:has(.tab-dot.thinking) { border-color: #d97706; background: #1c1a0e; }
  .tab-row:has(.tab-dot.done)     { border-color: #059669; background: #0d1f18; }

  .tab-dot {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; position: relative;
  }
  .tab-dot.idle     { background: #334155; }
  .tab-dot.thinking { background: #78350f; }
  .tab-dot.done     { background: #064e3b; }

  .pulse-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid #f59e0b;
    animation: pulse 1.2s ease-out infinite; opacity: 0;
  }
  @keyframes pulse {
    0%   { transform: scale(0.9); opacity: 0.7; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .tab-info { flex: 1; min-width: 0; }
  .tab-platform { font-size: 13px; font-weight: 600; color: #e2e8f0; }
  .tab-state    { font-size: 11px; margin-top: 1px; }

  .tab-debug { font-size: 9px; color: #475569; margin-top: 2px; font-family: monospace; }
  .tab-row.thinking { border-color: #d97706; background: #1c1a0e; }
  .tab-row.done     { border-color: #059669; background: #0d1f18; }

  .switch-btn {
    background: #334155; border: none; color: #94a3b8;
    width: 26px; height: 26px; border-radius: 6px;
    font-size: 13px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
  }
  .switch-btn:hover { background: #475569; color: #f1f5f9; }

  .not-ai {
    padding: 16px; background: #1e293b; border-radius: 10px;
    font-size: 12px; color: #64748b; text-align: center; line-height: 1.6;
  }

  /* ── Sites ── */
  .sites {
    margin: 10px 12px 0; background: #1e293b; border-radius: 10px; padding: 8px 10px;
  }
  .sites-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: #475569; margin-bottom: 6px;
  }
  .sites-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .site-chip {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    background: #0f172a; color: #94a3b8; border: 1px solid #334155;
  }

  /* ── Bottom row ── */
  .bottom-row {
    margin: 10px 12px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .toggle-row {
    flex: 1; display: flex; align-items: center; justify-content: space-between;
    background: #1e293b; border-radius: 10px; padding: 8px 10px;
  }
  .toggle-label { font-size: 11px; color: #94a3b8; }
  .toggle { position: relative; width: 34px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #334155;
    border-radius: 20px; cursor: pointer; transition: background 0.2s;
  }
  .slider:before {
    content: ""; position: absolute;
    width: 12px; height: 12px; left: 3px; top: 3px;
    background: white; border-radius: 50%; transition: transform 0.2s;
  }
  .toggle input:checked + .slider { background: #6366f1; }
  .toggle input:checked + .slider:before { transform: translateX(16px); }

  #test-btn {
    padding: 7px 10px; background: #1e293b;
    border: 1px solid #334155; border-radius: 10px;
    color: #94a3b8; font-size: 11px; cursor: pointer; white-space: nowrap;
    transition: background 0.2s, color 0.2s;
  }
  #test-btn:hover { background: #334155; color: #e2e8f0; }
  #test-btn.sent  { color: #34d399; border-color: #059669; }

  .notif-warning {
    margin: 8px 12px 0; padding: 7px 10px;
    background: #2d1a0e; border: 1px solid #92400e;
    border-radius: 8px; font-size: 11px; color: #fbbf24;
    text-align: center; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🤖</div>
  <div>
    <h1>AI Status Notifier</h1>
    <p>Tracks all open AI tools simultaneously</p>
  </div>
</div>

<div id="ai-tabs-list"></div>
<div id="notif-warning"></div>

<div class="sites">
  <div class="sites-title">Supported Sites</div>
  <div class="sites-list">
    <span class="site-chip">Claude</span>
    <span class="site-chip">ChatGPT</span>
    <span class="site-chip">Gemini</span>
    <span class="site-chip">Perplexity</span>
    <span class="site-chip">Copilot</span>
  </div>
</div>

<div class="bottom-row">
  <div class="toggle-row">
    <span class="toggle-label">🔔 Notifications</span>
    <label class="toggle">
      <input type="checkbox" id="notify-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>
  <button id="test-btn">Test 🔔</button>
</div>

<script src="popup.js"></script>
</body>
</html>
